name: Deploy to Firebase Hosting

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Deploy to Firebase Hosting
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_ZEROG_TOOLBOX }}
        run: |
          printf '%s' "$FIREBASE_SERVICE_ACCOUNT" > "$RUNNER_TEMP/service-account.json"
          export GOOGLE_APPLICATION_CREDENTIALS="$RUNNER_TEMP/service-account.json"
          set +e
          out=$(npx firebase-tools deploy --only hosting --project zerog-toolbox --non-interactive 2>&1)
          code=$?
          echo "$out"
          rm -f "$RUNNER_TEMP/service-account.json"
          # A byte-identical build is already live; Firebase rejects re-releasing it.
          # Treat that no-op case as success instead of failing the workflow.
          if [ "$code" -ne 0 ] && echo "$out" | grep -q "is the current active version"; then
            echo "Live channel already serves this exact version — nothing to deploy."
            exit 0
          fi
          exit "$code"
